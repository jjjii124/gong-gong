<script>
  // ------------------------------------------------------------------
  // window.storage 셰임(shim): 이 앱은 원래 Claude 아티팩트 환경에서만
  // 제공되는 window.storage API를 사용합니다. GitHub Pages 등 일반 웹
  // 호스팅에는 이 API가 없기 때문에 아래처럼 직접 구현해 대체합니다.
  // 앱 로직(디자인·기능)은 전혀 건드리지 않고 저장소만 교체하는 것입니다.
  //
  //  - shared(공유) 데이터  → Firebase Realtime Database
  //    (자료/게시글/포인트 등 "모든 사용자가 함께 보는 데이터".
  //     다른 기기·다른 브라우저에서도 서로 동기화됩니다.)
  //  - private(개인) 데이터 → 이 브라우저의 localStorage
  //    (그냥 "지금 이 기기에서 로그인된 사용자가 누구인지"만 기억하는
  //     용도라 기기마다 따로 있는 게 맞습니다.)
  //
  // ▼▼▼ 아래 firebaseConfig 부분만 본인 Firebase 프로젝트 값으로 ▼▼▼
  // ▼▼▼ 바꿔주세요. (설정 방법은 채팅 답변에 안내되어 있어요)      ▼▼▼
  // ------------------------------------------------------------------
  const firebaseConfig = {
    apiKey: "AIzaSyCi620lslnmtW_ESvcmiq0tJBsDDy7fUdo",
    authDomain: "gonggong-75d41.firebaseapp.com",
    databaseURL: "https://gonggong-75d41-default-rtdb.firebaseio.com",
    projectId: "gonggong-75d41",
  };
  // ▲▲▲ 여기까지 본인 값으로 교체 ▲▲▲

  firebase.initializeApp(firebaseConfig);
  const rtdb = firebase.database();
  const NS = "gonggong_v1";
  const sanitize = (k) => String(k).replace(/[.#$\[\]\/]/g, "_");
  const privKey = (k) => "gg_local_" + NS + "__" + k;

  window.storage = {
    async get(key, shared) {
      if (shared) {
        const snap = await rtdb.ref(`${NS}/${sanitize(key)}`).once("value");
        if (!snap.exists()) throw new Error("key not found: " + key);
        return { key, value: snap.val(), shared: true };
      }
      const raw = localStorage.getItem(privKey(key));
      if (raw === null) throw new Error("key not found: " + key);
      return { key, value: raw, shared: false };
    },
    async set(key, value, shared) {
      if (shared) {
        await rtdb.ref(`${NS}/${sanitize(key)}`).set(value);
        return { key, value, shared: true };
      }
      localStorage.setItem(privKey(key), value);
      return { key, value, shared: false };
    },
    async delete(key, shared) {
      if (shared) {
        await rtdb.ref(`${NS}/${sanitize(key)}`).remove();
        return { key, deleted: true, shared: true };
      }
      localStorage.removeItem(privKey(key));
      return { key, deleted: true, shared: false };
    },
    async list(prefix, shared) {
      if (shared) {
        const snap = await rtdb.ref(NS).once("value");
        const keys = [];
        if (snap.exists()) {
          snap.forEach((child) => {
            if (!prefix || String(child.key).indexOf(sanitize(prefix)) === 0) keys.push(child.key);
          });
        }
        return { keys, prefix, shared: true };
      }
      const base = "gg_local_" + NS + "__" + (prefix || "");
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.indexOf(base) === 0) keys.push(k.slice(("gg_local_" + NS + "__").length));
      }
      return { keys, prefix, shared: false };
    },
  };
</script>

async function loadDB() {
  try {
    const r = await window.storage.get(DB_KEY, true);
    if (!r) throw new Error("empty");
    const parsed = JSON.parse(r.value);
    if (!parsed.users || !parsed.users.admin) {
      parsed.users = { ...(parsed.users || {}), admin: emptyDB().users.admin };
    }
    if (!parsed.groups) parsed.groups = [];
    if (!parsed.messages) parsed.messages = [];
    Object.values(parsed.users).forEach((u) => {
      if (u.hasAvatar === undefined) u.hasAvatar = false;
      if (u.rankingVisible === undefined) u.rankingVisible = true;
      if (!u.groupIds) u.groupIds = [];
      if (!u.buyerStats) u.buyerStats = { totalSpent: 0, totalPurchases: 0 };
    });
    parsed.materials.forEach((m) => {
      if (m.deleted === undefined) m.deleted = false;
      if (m.textContent === undefined) m.textContent = "";
      if (m.groupId === undefined) m.groupId = null;
    });
    return parsed;
  } catch (e) {
    const fresh = emptyDB();
    try { await window.storage.set(DB_KEY, JSON.stringify(fresh), true); } catch (_) {}
    return fresh;
  }
}
async function persistDB(db) {
  try { await window.storage.set(DB_KEY, JSON.stringify(db), true); } catch (e) { console.error(e); }
}
async function saveFile(id, dataUrl) {
  try { await window.storage.set(`gg_file_${id}`, dataUrl, true); return true; } catch (e) { console.error(e); return false; }
}
async function loadFile(id) {
  try {
    const r = await window.storage.get(`gg_file_${id}`, true);
    return r ? r.value : null;
  } catch (e) { return null; }
}
// data URL을 직접 <a download>로 받으면 브라우저(특히 모바일)에 따라
// 다운로드가 아니라 그냥 열리기만 하거나 아예 아무 반응이 없는 경우가 있어,
// Blob으로 변환해 objectURL로 다운로드하도록 한다.
async function downloadDataUrl(dataUrl, filename) {
  try {
    const res = await fetch(dataUrl);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 4000);
  } catch (e) {
    console.error(e);
    // 최후의 수단: 새 탭에서 열기
    window.open(dataUrl, "_blank");
  }
}
function downloadText(text, filename) {
  const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 4000);
}

      {[1, 2, 3, 4, 5].map((i) => (
        <Star key={i} size={size} fill={i <= Math.round(value) ? "#FFB300" : "none"} stroke="#FFB300" />
      ))}
    </span>
  );
}
function Avatar({ user, size = 32 }) {
  const [img, setImg] = useState(null);
  useEffect(() => {
    let alive = true;
    if (user && user.hasAvatar) {
      loadFile(`avatar_${user.id}`).then((v) => { if (alive) setImg(v); });
    } else {
      setImg(null);
    }
    return () => { alive = false; };
  }, [user && user.id, user && user.hasAvatar]);
  if (img) {
    return <img src={img} alt="" style={{ width: size, height: size, borderRadius: "50%", objectFit: "cover", flexShrink: 0 }} />;
  }
  return (
    <div style={{ width: size, height: size, borderRadius: "50%", background: COLORS.primary, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: size * 0.42, flexShrink: 0 }}>

  );
}

function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, [msg]);
  if (!msg) return null;
  return (
    <div style={{
      position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", zIndex: 200,
      background: COLORS.text, color: "#fff", padding: "10px 18px", borderRadius: 999,

}

      const s = await (async () => { try { const r = await window.storage.get(SESSION_KEY, false); return r ? JSON.parse(r.value) : null; } catch (e) { return null; } })();
      if (s && d.users[s.userId] && !d.users[s.userId].banned) setMe(s.userId);
    })();
    const refresh = async () => {
      const fresh = await loadDB();
      dbRef.current = fresh;
      setDb(fresh);
    };
    const interval = setInterval(refresh, 3000);
    const onFocus = () => { if (document.visibilityState === "visible") refresh(); };
    document.addEventListener("visibilitychange", onFocus);
    window.addEventListener("focus", onFocus);
    return () => {
      clearInterval(interval);
      document.removeEventListener("visibilitychange", onFocus);
      window.removeEventListener("focus", onFocus);
    };
  }, []);

  useEffect(() => {
    if (db) { dbRef.current = db; }
  }, [db]);

  const mutate = useCallback(async (fn) => {
    // 저장 직전에 항상 최신 데이터를 다시 불러와 다른 사용자(관리자 포함)의
    // 변경사항을 덮어쓰지 않도록 한다.
    const fresh = await loadDB();
    fn(fresh);
    dbRef.current = fresh;
    setDb(fresh);
    await persistDB(fresh);
  }, []);

  const setSession = async (userId) => {
    const fresh = await loadDB();
    dbRef.current = fresh;
    setDb(fresh);
    setMe(userId);
    try { await window.storage.set(SESSION_KEY, JSON.stringify({ userId }), false); } catch (e) {}
  };
  const logout = async () => {
    setMe(null); setView("home");
    try { await window.storage.delete(SESSION_KEY, false); } catch (e) {}
  };

  if (!db) {
    return <div style={{ padding: 60, textAlign: "center", color: COLORS.muted, fontFamily: FONT }}>불러오는 중...</div>;
  }

  const user = me ? db.users[me] : null;
  const isAdmin = user && user.role === "admin";

  /* ---------- 포인트/알림 유틸 ---------- */
  const addPoints = (d, userId, amount, desc) => {
    const u = d.users[userId];
    if (!u) return;
    u.points += amount;
    d.pointHistory.push({ id: uid(), userId, type: amount >= 0 ? "적립" : "사용", amount, desc, date: new Date().toISOString() });
  };

  /* ---------- 인증 ---------- */
  const doSignup = async (form) => {
    if (!form.id || !form.pw || !form.nickname || !form.name) { notify("모든 항목을 입력해주세요."); return; }
    if (db.users[form.id]) { notify("이미 사용 중인 아이디입니다."); return; }
    if (Object.values(db.users).some((u) => u.nickname === form.nickname)) { notify("이미 사용 중인 닉네임입니다."); return; }
    await mutate((d) => {
      d.users[form.id] = {
        id: form.id, pw: form.pw, school: form.school, grade: form.grade, cls: form.cls,
        name: form.name, nickname: form.nickname, role: "user", points: 0, banned: false,
        joined: todayStr(), following: [], followers: [], hasAvatar: false,
        rankingVisible: true, groupIds: [],
        attendance: { dates: [], streak: 0, lastDate: null },

    notify("가입 완료! 1000P가 지급되었습니다 🎁");

  const doLogin = async (id, pw) => {
    const u = db.users[id];
    if (!u || u.pw !== pw) { notify("아이디 또는 비밀번호가 올바르지 않습니다."); return; }

    notify(`${u.nickname}님, 환영합니다!`);
  };

  /* ---------- 프로필 수정 (닉네임/아이디/비번/사진) ---------- */
  const doUpdateNickname = async (newNick) => {
    const trimmed = (newNick || "").trim();
    if (!trimmed) { notify("닉네임을 입력해주세요."); return; }
    if (trimmed === user.nickname) return;
    const fresh = await loadDB();
    if (Object.values(fresh.users).some((u) => u.id !== me && u.nickname === trimmed)) {
      notify("이미 사용 중인 닉네임입니다."); return;
    }
    fresh.users[me].nickname = trimmed;
    dbRef.current = fresh; setDb(fresh);
    await persistDB(fresh);
    notify("닉네임이 변경되었습니다.");
  };
  const doUpdateId = async (newId) => {
    const trimmed = (newId || "").trim();
    if (!trimmed) { notify("아이디를 입력해주세요."); return; }
    if (trimmed === me) return;
    const fresh = await loadDB();
    if (fresh.users[trimmed]) { notify("이미 사용 중인 아이디입니다."); return; }
    const old = me;
    const u = fresh.users[old];
    if (u.hasAvatar) {
      const avatarData = await loadFile(`avatar_${old}`);
      if (avatarData) await saveFile(`avatar_${trimmed}`, avatarData);
    }
    u.id = trimmed;
    fresh.users[trimmed] = u;
    delete fresh.users[old];
    fresh.materials.forEach((m) => {
      if (m.sellerId === old) m.sellerId = trimmed;
      m.purchasedBy = m.purchasedBy.map((x) => (x === old ? trimmed : x));
      m.favoritedBy = m.favoritedBy.map((x) => (x === old ? trimmed : x));
      m.reviews.forEach((r) => { if (r.userId === old) r.userId = trimmed; });
      m.questions.forEach((q) => { if (q.userId === old) q.userId = trimmed; });
    });
    fresh.posts.forEach((p) => {
      if (p.authorId === old) p.authorId = trimmed;
      p.comments.forEach((c) => { if (c.authorId === old) c.authorId = trimmed; });
    });
    fresh.pointHistory.forEach((h) => { if (h.userId === old) h.userId = trimmed; });
    fresh.reports.forEach((r) => { if (r.reporterId === old) r.reporterId = trimmed; });
    (fresh.groups || []).forEach((g) => {
      if (g.ownerId === old) g.ownerId = trimmed;
      g.members = g.members.map((x) => (x === old ? trimmed : x));
      (g.messages || []).forEach((gm) => { if (gm.authorId === old) gm.authorId = trimmed; });
    });
    (fresh.messages || []).forEach((msg) => {
      if (msg.fromId === old) msg.fromId = trimmed;
      if (msg.toId === old) msg.toId = trimmed;
    });
    Object.values(fresh.users).forEach((usr) => {
      usr.following = usr.following.map((x) => (x === old ? trimmed : x));
      usr.followers = usr.followers.map((x) => (x === old ? trimmed : x));
    });
    dbRef.current = fresh; setDb(fresh);
    await persistDB(fresh);
    setMe(trimmed);
    try { await window.storage.set(SESSION_KEY, JSON.stringify({ userId: trimmed }), false); } catch (e) {}
    notify("아이디가 변경되었습니다.");
  };
  const doUpdatePassword = async (curPw, newPw) => {
    if (!curPw || !newPw) { notify("비밀번호를 입력해주세요."); return; }

  const doToggleRankingVisible = async () => {
    await mutate((d) => { d.users[me].rankingVisible = !d.users[me].rankingVisible; });
  };

  /* ---------- 출석체크 ---------- */
  const doAttendance = async () => {
    if (!me) return;
    const t = todayStr();
    if (user.attendance.dates.includes(t)) { notify("오늘은 이미 출석했어요."); return; }
    await mutate((d) => {
      const u = d.users[me];
      const yest = localDateStr(new Date(Date.now() - 86400000));
      u.attendance.streak = u.attendance.lastDate === yest ? u.attendance.streak + 1 : 1;
      u.attendance.dates.push(t);
      u.attendance.lastDate = t;
      addPoints(d, me, 20, "출석 체크");
      if (u.attendance.streak === 7) addPoints(d, me, 100, "7일 연속 출석 보너스");
      if (u.attendance.streak === 30) addPoints(d, me, 500, "30일 연속 출석 보너스");
    });
    notify("출석 완료! +20P 🔥");
  };

  /* ---------- 자료 업로드/구매 ---------- */
  const doUpload = async (form, file, groupId) => {
    if (!form.title || !form.subject || !form.grade) { notify("필수 항목을 입력해주세요."); return; }
    if (!file && !form.textContent) { notify("파일을 올리거나, 판매할 글 내용을 입력해주세요."); return; }
    if (file && file.size > 20 * 1024 * 1024) { notify("파일 용량은 20MB 이하로 올려주세요. (현재 " + (file.size / 1024 / 1024).toFixed(1) + "MB)"); return; }
    const id = uid();
    if (file) {
      const dataUrl = await new Promise((res) => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(file); });
      const ok = await saveFile(id, dataUrl);
      if (!ok) { notify("파일 저장에 실패했어요. 네트워크 상태를 확인하고 다시 시도해주세요."); return; }
    }
    await mutate((d) => {
      d.materials.push({
        id, sellerId: me, title: form.title, desc: form.desc, subject: form.subject,
        grade: form.grade, price: Number(form.price) || 0, fileType: file ? file.type : "",
        hasFile: !!file, textContent: form.textContent || "", groupId: groupId || null,
        createdAt: new Date().toISOString(), deleted: false, deletedBy: null,
        purchasedBy: [], favoritedBy: [], reviews: [], questions: [], reports: [],
      });
    });
    setShowUpload(false);
    notify("자료가 등록되었습니다!");
  };
  const doDeleteMaterial = async (matId, byAdmin) => {
    // 완전히 지우면 이미 구매한 사람이 자료를 잃게 되므로, 목록에서만 숨기고
    // 구매자·판매자 본인은 계속 접근할 수 있도록 "삭제됨" 표시만 한다.
    await mutate((d) => {
      const m = d.materials.find((x) => x.id === matId);
      if (m) { m.deleted = true; m.deletedBy = byAdmin ? "admin" : "seller"; }
    });
    setDetailMaterial(null);
    notify("자료를 삭제했습니다. (이미 구매한 사용자는 계속 볼 수 있어요)");
  };
  const doPurchase = async (mat) => {
    if (!me) { notify("로그인이 필요합니다."); return; }
    if (mat.sellerId === me) { notify("본인 자료는 구매할 수 없어요."); return; }
    if (mat.purchasedBy.includes(me)) { notify("이미 구매한 자료예요."); return; }
    if (user.points < mat.price) { notify("포인트가 부족합니다."); return; }
    await mutate((d) => {
      const m = d.materials.find((x) => x.id === mat.id);
      m.purchasedBy.push(me);
      const seller = d.users[m.sellerId];
      const buyer = d.users[me];
      const t = todayStr();
      if (seller.sellerStats.lastResetDay !== t) { seller.sellerStats.today = 0; seller.sellerStats.lastResetDay = t; }
      seller.sellerStats.today += 1; seller.sellerStats.month += 1; seller.sellerStats.total += 1;
      seller.sellerStats.totalEarned += m.price;
      if (!buyer.buyerStats) buyer.buyerStats = { totalSpent: 0, totalPurchases: 0 };
      buyer.buyerStats.totalSpent += m.price;
      buyer.buyerStats.totalPurchases += 1;
      if (m.price > 0) {
        addPoints(d, me, -m.price, `자료 구매 - ${m.title}`);
        addPoints(d, m.sellerId, m.price, `자료 판매 - ${m.title}`);
      } else {
        d.pointHistory.push({ id: uid(), userId: me, type: "구매", amount: 0, desc: `무료 자료 다운로드 - ${m.title}`, date: new Date().toISOString() });
      }
    });
    notify("구매 완료! 마이페이지에서 확인하세요.");
  };
  const doFavorite = async (matId) => {
    if (!me) { notify("로그인이 필요합니다."); return; }
    await mutate((d) => {
      const m = d.materials.find((x) => x.id === matId);
      const i = m.favoritedBy.indexOf(me);
      if (i >= 0) m.favoritedBy.splice(i, 1); else m.favoritedBy.push(me);
    });
  };
  const doFollow = async (sellerId) => {
    if (!me) { notify("로그인이 필요합니다."); return; }
    if (sellerId === me) return;
    await mutate((d) => {
      const u = d.users[me]; const s = d.users[sellerId];

      if (i >= 0) { u.following.splice(i, 1); s.followers = s.followers.filter((x) => x !== me); }
      else { u.following.push(sellerId); s.followers.push(me); }

  const doReview = async (matId, rating, text) => {
    await mutate((d) => {
      const m = d.materials.find((x) => x.id === matId);
      m.reviews = m.reviews.filter((r) => r.userId !== me);
      m.reviews.push({ userId: me, rating, text, date: new Date().toISOString() });
    });
    notify("후기가 등록되었습니다.");
  };
  const doAsk = async (matId, text) => {
    if (!me) { notify("로그인이 필요합니다."); return; }
    await mutate((d) => {
      const m = d.materials.find((x) => x.id === matId);
      m.questions.push({ id: uid(), userId: me, text, answer: "", date: new Date().toISOString() });

  const doAnswer = async (matId, qid, answer) => {

  /* ---------- 게시판 ---------- */
  const doCreatePost = async (board, form) => {
    if (!me) { notify("로그인이 필요합니다."); return; }
    if (!form.title || !form.content) { notify("제목과 내용을 입력해주세요."); return; }
    await mutate((d) => {

      d.posts.push(post);

    setShowPostForm(null);
    notify("게시글이 등록되었습니다.");
  };
  const doComment = async (postId, content) => {
    if (!me) { notify("로그인이 필요합니다."); return; }

      const p = d.posts.find((x) => x.id === postId);
      p.comments.push({ id: uid(), authorId: me, content, date: new Date().toISOString() });

  const doDeletePost = async (postId) => {

    notify("게시글을 삭제했습니다.");
  };
  const doDeleteComment = async (postId, commentId) => {

      if (p) p.comments = p.comments.filter((c) => c.id !== commentId);
    });
    notify("댓글을 삭제했습니다.");
  };

  /* ---------- 신고 ---------- */
  const doReport = async (target, reason) => {
    if (!me) { notify("로그인이 필요합니다."); return; }
    await mutate((d) => {
      let targetTitle = "(삭제됨)";
      if (target.type === "자료") { const m = d.materials.find((x) => x.id === target.id); if (m) targetTitle = m.title; }
      if (target.type === "게시글") { const p = d.posts.find((x) => x.id === target.id); if (p) targetTitle = p.title; }
      d.reports.push({ id: uid(), type: target.type, targetId: target.id, targetTitle, reporterId: me, reason, date: new Date().toISOString(), status: "대기" });
    });
    setShowReport(null);
    notify("신고가 접수되었습니다.");
  };
  const resolveReport = async (rid, status, alsoDelete) => {
    await mutate((d) => {
      const r = d.reports.find((x) => x.id === rid);
      if (!r) return;
      r.status = status;
      if (alsoDelete) {
        if (r.type === "자료") {
          const m = d.materials.find((x) => x.id === r.targetId);
          if (m) { m.deleted = true; m.deletedBy = "admin"; }
        } else if (r.type === "게시글") {
          d.posts = d.posts.filter((p) => p.id !== r.targetId);
        }
      }
    });
    notify(status === "처리완료" ? "신고를 처리했습니다." : "신고를 반려했습니다.");
  };

  /* ---------- 관리자 ---------- */
  const adminBan = async (userId, banned) => {
    await mutate((d) => { d.users[userId].banned = banned; });
    notify(banned ? "계정을 정지했습니다." : "정지를 해제했습니다.");

  const adminGrant = async (userId, amount, reason) => {

    await mutate((d) => {
      const u = d.users[userId];
      const finalAmt = u.points + amt < 0 ? -u.points : amt;
      addPoints(d, userId, finalAmt, reason ? reason : (amt >= 0 ? "관리자 지급" : "관리자 회수"));
    });
    notify(amt >= 0 ? "포인트를 지급했습니다." : "포인트를 회수했습니다.");
  };
  const adminAddNotice = async (title, content) => {
    await mutate((d) => { d.notices.unshift({ id: uid(), title, content, date: todayStr() }); });
    notify("공지를 등록했습니다.");

  const adminEditNotice = async (id, title, content) => {

      const n = d.notices.find((x) => x.id === id);
      if (n) { n.title = title; n.content = content; }

    await mutate((d) => { d.notices = d.notices.filter((n) => n.id !== id); });
  };

  /* ---------- 그룹 ---------- */
  const doCreateGroup = async (name, pw) => {
    const trimmed = (name || "").trim();
    if (!trimmed) { notify("그룹 이름을 입력해주세요."); return; }
    await mutate((d) => {
      const g = { id: uid(), name: trimmed, ownerId: me, members: [me], messages: [], createdAt: new Date().toISOString(), pw: (pw || "").trim() || null };
      d.groups.push(g);
      d.users[me].groupIds.push(g.id);
    });
    notify("그룹이 만들어졌습니다!");
  };
  const doJoinGroup = async (groupId, pw) => {
    if (!me) { notify("로그인이 필요합니다."); return; }
    const fresh = await loadDB();
    const g = fresh.groups.find((x) => x.id === groupId);
    if (!g) { notify("존재하지 않는 그룹이에요."); return; }
    if (g.members.includes(me)) { notify("이미 가입된 그룹이에요."); return; }
    if (g.members.length >= GROUP_MAX_MEMBERS) { notify("그룹 인원이 가득 찼어요 (최대 20명)."); return; }
    if (g.pw && g.pw !== (pw || "")) { notify("비밀번호가 올바르지 않습니다."); return; }
    g.members.push(me);
    fresh.users[me].groupIds.push(groupId);
    dbRef.current = fresh; setDb(fresh);
    await persistDB(fresh);
    notify("그룹에 가입했습니다!");
  };
  const doLeaveGroup = async (groupId) => {
    await mutate((d) => {
      const g = d.groups.find((x) => x.id === groupId);
      if (!g) return;
      g.members = g.members.filter((x) => x !== me);
      d.users[me].groupIds = d.users[me].groupIds.filter((x) => x !== groupId);
      if (g.members.length === 0) d.groups = d.groups.filter((x) => x.id !== groupId);
      else if (g.ownerId === me) g.ownerId = g.members[0];
    });
    notify("그룹에서 나갔습니다.");

    await mutate((d) => {
      const g = d.groups.find((x) => x.id === groupId);
      if (g) g.messages.push({ id: uid(), authorId: me, content, date: new Date().toISOString() });
    });
  };

  const doSendMessage = async (toId, content) => {

    await mutate((d) => {
      d.messages.push({ id: uid(), fromId: me, toId, content, date: new Date().toISOString() });
    });

  /* ---------------------------------------------------------------
     렌더링

  if (!me) {
    return (
      <Shell>
        <AuthScreen mode={authMode} setMode={setAuthMode} onLogin={doLogin} onSignup={doSignup} db={db} />
        <Toast msg={toast} onDone={() => setToast("")} />
      </Shell>
    );
  }

  return (
    <Shell>
      <TopBar
        user={user} isAdmin={isAdmin} view={view} setView={setView}
        onLogout={logout} onSearch={(q) => { setSearchQuery(q); setView("search"); }}
      />
      <div style={{ maxWidth: 1080, margin: "0 auto", padding: "20px 16px 80px" }}>
        {view === "home" && (
          <HomeView
            db={db} user={user} onAttend={doAttendance} onOpenMat={setDetailMaterial}
            setView={setView}
          />
        )}
        {view === "materials" && (
          <MaterialsView
            db={db} me={me} onOpenMat={setDetailMaterial} onUpload={() => { setUploadGroupId(null); setShowUpload(true); }}
          />
        )}
        {view === "search" && (
          <SearchView db={db} query={searchQuery} setQuery={setSearchQuery}
            filters={searchFilters} setFilters={setSearchFilters} onOpenMat={setDetailMaterial} />
        )}
        {view === "free" && (
          <BoardView
            title="자유게시판" cats={["전체", ...FREE_CATS]} cat={freeCat} setCat={setFreeCat}
            posts={db.posts.filter((p) => p.board === "free" && (freeCat === "전체" || p.category === freeCat))}
            db={db} me={me} onOpen={setDetailPost} onNew={() => setShowPostForm("free")}
          />
        )}
        {view === "qna" && (
          <BoardView
            title="질문게시판" cats={null}
            posts={db.posts.filter((p) => p.board === "qna")}
            db={db} me={me} onOpen={setDetailPost} onNew={() => setShowPostForm("qna")}
          />
        )}
        {view === "notices" && <NoticesView db={db} />}
        {view === "groups" && (
          <GroupsView db={db} me={me} onOpenGroup={setDetailGroup} onCreate={doCreateGroup} onJoin={doJoinGroup} />
        )}
        {view === "ranking" && <RankingView db={db} me={me} />}
        {view === "messages" && (
          <MessagesView db={db} me={me} isAdmin={isAdmin} onSend={doSendMessage} peer={msgPeer} setPeer={setMsgPeer} />
        )}
        {view === "points" && <PointsView db={db} user={user} />}
        {view === "mypage" && (
          <MyPage
            db={db} me={me} user={user} onOpenMat={setDetailMaterial} onOpenPost={setDetailPost}
            onDeleteMat={doDeleteMaterial} onAttend={doAttendance}
            onUpdateNickname={doUpdateNickname} onUpdateId={doUpdateId} onUpdatePassword={doUpdatePassword}
            onAvatarChange={doAvatarChange} onToggleRanking={doToggleRankingVisible}
          />
        )}
        {view === "admin" && isAdmin && (
          <AdminView db={db} onBan={adminBan} onGrant={adminGrant}
            onAddNotice={adminAddNotice} onDeleteNotice={adminDeleteNotice} onEditNotice={adminEditNotice}
            onDeleteMat={doDeleteMaterial} onDeletePost={doDeletePost} onResolveReport={resolveReport}
            onOpenMessage={(uid_) => { setMsgPeer(uid_); setView("messages"); }}
            onOpenMat={(m) => setDetailMaterial(m)} onOpenPost={(p) => setDetailPost(p)} />
        )}
      </div>

      {detailMaterial && (
        <MaterialModal
          mat={db.materials.find((m) => m.id === detailMaterial.id) || detailMaterial}
          db={db} me={me} isAdmin={isAdmin}
          onClose={() => setDetailMaterial(null)}
          onBuy={doPurchase} onFav={doFavorite} onFollow={doFollow}
          onReview={doReview} onAsk={doAsk} onAnswer={doAnswer}
          onDelete={doDeleteMaterial} onReport={() => setShowReport({ type: "자료", id: detailMaterial.id })}
        />
      )}
      {detailPost && (
        <PostModal
          post={db.posts.find((p) => p.id === detailPost.id) || detailPost}
          db={db} me={me} isAdmin={isAdmin}
          onClose={() => setDetailPost(null)} onComment={doComment} onDeleteComment={doDeleteComment}
          onDelete={doDeletePost} onReport={() => setShowReport({ type: "게시글", id: detailPost.id })}
        />
      )}
      {showUpload && (
        <UploadModal onClose={() => setShowUpload(false)} onSubmit={(form, file) => doUpload(form, file, uploadGroupId)} />
      )}
      {detailGroup && (
        <GroupModal
          group={db.groups.find((g) => g.id === detailGroup.id) || detailGroup}
          db={db} me={me}
          onClose={() => setDetailGroup(null)}
          onLeave={doLeaveGroup} onSendMessage={doGroupMessage}
          onOpenMat={setDetailMaterial}
          onUpload={() => { setUploadGroupId(detailGroup.id); setShowUpload(true); }}
        />
      )}
      {showPostForm && (
        <PostFormModal board={showPostForm} db={db} user={user}
          onClose={() => setShowPostForm(null)} onSubmit={(f) => doCreatePost(showPostForm, f)} />
      )}
      {showReport && (
        <Modal title="신고하기" onClose={() => setShowReport(null)} width={360}>
          <p style={{ fontSize: 13, color: COLORS.muted, marginTop: 0 }}>신고 사유를 선택해주세요. 관리자가 확인 후 처리합니다.</p>
          {REPORT_REASONS.map((r) => (
            <button key={r} className="gg-btn-outline" style={{ width: "100%", marginBottom: 8, justifyContent: "flex-start" }}
              onClick={() => doReport(showReport, r)}>{r}</button>
          ))}
        </Modal>
      )}
      <Toast msg={toast} onDone={() => setToast("")} />
      <GlobalStyle />
    </Shell>
  );
}

        </select>
        <select className="gg-input" style={{ width: "auto" }} value={grade} onChange={(e) => setGrade(e.target.value)}>
          {["전체", ...GRADES].map((s) => <option key={s}>{s}</option>)}

      </div>
      {list.length === 0 ? <EmptyState text="조건에 맞는 자료가 없어요." /> : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px,1fr))", gap: 12 }}>

      )}

}

/* ---------------------------------------------------------------
   검색
--------------------------------------------------------------- */
function SearchView({ db, query, setQuery, filters, setFilters, onOpenMat }) {
  let list = db.materials.filter((m) => {
    if (m.deleted || m.groupId) return false;
    const q = query.trim().toLowerCase();
    if (q && !(m.title.toLowerCase().includes(q) || m.desc.toLowerCase().includes(q) || m.subject.includes(q))) return false;
    if (filters.subject && m.subject !== filters.subject) return false;
    if (filters.grade && m.grade !== filters.grade) return false;
    if (filters.free && m.price !== 0) return false;
    if (filters.school) { const s = db.users[m.sellerId]; if (!s || s.school !== filters.school) return false; }
    return true;
  });
  if (filters.sort === "popular") list.sort((a, b) => b.purchasedBy.length - a.purchasedBy.length);
  else list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  return (
    <div>
      <h2 style={{ fontSize: 19, fontWeight: 900, marginTop: 0 }}>검색</h2>
      <div style={{ position: "relative", marginBottom: 14 }}>
        <Search size={16} style={{ position: "absolute", left: 14, top: 13, color: COLORS.muted }} />
        <input className="gg-input" style={{ paddingLeft: 38 }} value={query} onChange={(e) => setQuery(e.target.value)} placeholder="제목, 설명, 과목으로 검색" />
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 18 }}>
        <select className="gg-input" style={{ width: "auto" }} value={filters.subject} onChange={(e) => setFilters({ ...filters, subject: e.target.value })}>
          <option value="">과목 전체</option>{SUBJECTS.map((s) => <option key={s}>{s}</option>)}
        </select>
        <select className="gg-input" style={{ width: "auto" }} value={filters.grade} onChange={(e) => setFilters({ ...filters, grade: e.target.value })}>
          <option value="">학년 전체</option>{GRADES.map((s) => <option key={s}>{s}</option>)}
        </select>
        <input className="gg-input" style={{ width: 140 }} placeholder="학교명" value={filters.school} onChange={(e) => setFilters({ ...filters, school: e.target.value })} />
        <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, fontWeight: 600, padding: "0 6px" }}>
          <input type="checkbox" checked={filters.free} onChange={(e) => setFilters({ ...filters, free: e.target.checked })} /> 무료만
        </label>
        <select className="gg-input" style={{ width: "auto" }} value={filters.sort} onChange={(e) => setFilters({ ...filters, sort: e.target.value })}>
          <option value="popular">인기순</option><option value="recent">최신순</option>
        </select>
      </div>
      {list.length === 0 ? <EmptyState text="검색 결과가 없어요." /> : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px,1fr))", gap: 12 }}>
          {list.map((m) => <MaterialCard key={m.id} m={m} db={db} onClick={() => onOpenMat(m)} />)}
        </div>
      )}
    </div>
  );
}

              <div style={{ textAlign: "center", padding: "20px 0", color: COLORS.accent }}>

            ) : owned ? (

            <div style={{ fontSize: 11, color: COLORS.muted }}>판매 {seller?.sellerStats.total || 0}건 · {mat.reviews.length > 0 ? <>평점 {avg.toFixed(1)}</> : "후기 없음"}</div>

}

/* ---------------------------------------------------------------
   업로드 모달
--------------------------------------------------------------- */
function UploadModal({ onClose, onSubmit }) {
  const [form, setForm] = useState({ title: "", desc: "", subject: SUBJECTS[0], grade: GRADES[0], price: 0, textContent: "" });
  const [mode, setMode] = useState("file"); // "file" | "text"
  const [file, setFile] = useState(null);
  const [agree, setAgree] = useState(false);
  const [uploading, setUploading] = useState(false);
  const handleSubmit = async () => {
    setUploading(true);
    try { await onSubmit(form, file); } finally { setUploading(false); }
  };
  return (
    <Modal title="자료 올리기" onClose={onClose} width={480}>
      <Field label="제목"><input className="gg-input" value={form.title} onChange={(e) => setForm({ ...form, title: e.target.value })} /></Field>
      <Field label="설명"><textarea className="gg-input" rows={3} value={form.desc} onChange={(e) => setForm({ ...form, desc: e.target.value })} /></Field>
      <div style={{ display: "flex", gap: 8 }}>
        <div style={{ flex: 1 }}><Field label="과목">
          <select className="gg-input" value={form.subject} onChange={(e) => setForm({ ...form, subject: e.target.value })}>{SUBJECTS.map((s) => <option key={s}>{s}</option>)}</select>
        </Field></div>
        <div style={{ flex: 1 }}><Field label="학년">
          <select className="gg-input" value={form.grade} onChange={(e) => setForm({ ...form, grade: e.target.value })}>{GRADES.map((s) => <option key={s}>{s}</option>)}</select>
        </Field></div>
      </div>
      <Field label="가격 (100P 단위, 무료는 0)">
        <input className="gg-input" type="number" step={100} min={0} value={form.price} onChange={(e) => setForm({ ...form, price: e.target.value })} />
      </Field>
      <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
        <button type="button" className={`gg-tab ${mode === "file" ? "active" : ""}`} onClick={() => setMode("file")}>파일 올리기</button>
        <button type="button" className={`gg-tab ${mode === "text" ? "active" : ""}`} onClick={() => setMode("text")}>글 직접 작성해서 팔기</button>
      </div>
      {mode === "file" ? (
        <Field label="파일 (PDF, JPG, PNG, JPEG · 20MB 이하)">
          <input className="gg-input" type="file" accept=".pdf,.jpg,.jpeg,.png" onChange={(e) => setFile(e.target.files[0])} />
          {file && <div style={{ fontSize: 11.5, color: COLORS.muted, marginTop: 4 }}>{(file.size / 1024 / 1024).toFixed(1)}MB</div>}
        </Field>
      ) : (
        <Field label="판매할 글 내용">
          <textarea className="gg-input" rows={6} placeholder="여기에 정리한 노트나 글을 직접 작성하세요. 구매 전에는 앞부분만 미리보기로 보여요." value={form.textContent} onChange={(e) => setForm({ ...form, textContent: e.target.value })} />
        </Field>
      )}
      <label style={{ display: "flex", gap: 8, fontSize: 12.5, color: COLORS.muted, alignItems: "flex-start", margin: "14px 0" }}>
        <input type="checkbox" checked={agree} onChange={(e) => setAgree(e.target.checked)} style={{ marginTop: 2 }} />
        본인이 직접 제작했거나 공유 권한이 있는 자료만 업로드합니다. (학교 시험지, 학원 교재, 문제집, 저작권 침해 자료는 업로드할 수 없습니다.)
      </label>
      <button className="gg-btn" disabled={!agree || uploading} style={{ width: "100%", justifyContent: "center" }} onClick={handleSubmit}>
        {uploading ? "업로드 중... (파일이 크면 시간이 걸릴 수 있어요)" : "등록하기"}
      </button>
    </Modal>
  );
}

function GroupsView({ db, me, onOpenGroup, onCreate, onJoin }) {
  const [showCreate, setShowCreate] = useState(false);
  const [name, setName] = useState("");
  const [groupPw, setGroupPw] = useState("");
  const [joinTarget, setJoinTarget] = useState(null); // 비밀번호가 필요한 그룹 가입 시도
  const [joinPwInput, setJoinPwInput] = useState("");
  const myGroups = db.groups.filter((g) => g.members.includes(me));
  const otherGroups = db.groups.filter((g) => !g.members.includes(me));

    if (g.pw) { setJoinTarget(g); setJoinPwInput(""); }

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <h2 style={{ margin: 0, fontSize: 19, fontWeight: 900 }}>👥 그룹</h2>

      </div>
      <h3 style={{ fontSize: 14, fontWeight: 800, color: COLORS.muted, margin: "0 0 10px" }}>내 그룹 ({myGroups.length})</h3>
      {myGroups.length === 0 ? <EmptyState text="아직 가입한 그룹이 없어요." /> : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(220px,1fr))", gap: 12, marginBottom: 24 }}>
          {myGroups.map((g) => (
            <div key={g.id} className="gg-card" style={{ cursor: "pointer" }} onClick={() => onOpenGroup(g)}>
              <div style={{ fontWeight: 800, fontSize: 15, display: "flex", alignItems: "center", gap: 6 }}>{g.pw && <Lock size={13} color={COLORS.muted} />} {g.name}</div>
              <div style={{ fontSize: 12, color: COLORS.muted, marginTop: 6 }}>멤버 {g.members.length}/{GROUP_MAX_MEMBERS}명</div>
            </div>
          ))}
        </div>
      )}
      <h3 style={{ fontSize: 14, fontWeight: 800, color: COLORS.muted, margin: "0 0 10px" }}>가입 가능한 그룹</h3>
      {otherGroups.length === 0 ? <EmptyState text="가입할 수 있는 다른 그룹이 없어요." /> : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(220px,1fr))", gap: 12 }}>
          {otherGroups.map((g) => (
            <div key={g.id} className="gg-card">
              <div style={{ fontWeight: 800, fontSize: 15, display: "flex", alignItems: "center", gap: 6 }}>{g.pw && <Lock size={13} color={COLORS.muted} />} {g.name}</div>
              <div style={{ fontSize: 12, color: COLORS.muted, margin: "6px 0 10px" }}>멤버 {g.members.length}/{GROUP_MAX_MEMBERS}명{g.pw ? " · 비밀번호 필요" : ""}</div>
              <button className="gg-btn-outline" style={{ width: "100%", justifyContent: "center" }} disabled={g.members.length >= GROUP_MAX_MEMBERS} onClick={() => attemptJoin(g)}>
                {g.members.length >= GROUP_MAX_MEMBERS ? "인원 마감" : g.pw ? "🔒 비밀번호로 가입" : "가입하기"}
              </button>
            </div>
          ))}
        </div>
      )}
      {showCreate && (
        <Modal title="그룹 만들기" onClose={() => setShowCreate(false)} width={360}>
          <Field label="그룹 이름"><input className="gg-input" value={name} onChange={(e) => setName(e.target.value)} placeholder="예: 수학 스터디" /></Field>
          <Field label="비밀번호 (선택)"><input className="gg-input" value={groupPw} onChange={(e) => setGroupPw(e.target.value)} placeholder="설정하면 가입할 때 비밀번호가 필요해요" /></Field>
          <p style={{ fontSize: 12, color: COLORS.muted, marginTop: -6 }}>최대 {GROUP_MAX_MEMBERS}명까지 가입할 수 있어요.</p>
          <button className="gg-btn" style={{ width: "100%", justifyContent: "center" }} onClick={() => { onCreate(name, groupPw); setName(""); setGroupPw(""); setShowCreate(false); }}>만들기</button>
        </Modal>
      )}
      {joinTarget && (
        <Modal title={`"${joinTarget.name}" 가입`} onClose={() => setJoinTarget(null)} width={340}>
          <Field label="그룹 비밀번호"><input className="gg-input" type="password" autoFocus value={joinPwInput} onChange={(e) => setJoinPwInput(e.target.value)} placeholder="비밀번호를 입력하세요" /></Field>
          <button className="gg-btn" style={{ width: "100%", justifyContent: "center" }} onClick={() => { onJoin(joinTarget.id, joinPwInput); setJoinTarget(null); }}>가입하기</button>
        </Modal>
      )}
    </div>
  );
}

function RankingList({ items, unit }) {

    <div className="gg-card" style={{ padding: 0 }}>
      {items.map((it, i) => (
        <div key={it.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 16px", borderBottom: i < items.length - 1 ? `1px solid ${COLORS.border}` : "none", background: it.me ? "#EEF1FF" : "transparent" }}>
          <div style={{ width: 24, textAlign: "center", fontWeight: 900, color: it.rank <= 3 ? COLORS.accent : COLORS.muted }}>{it.rank}</div>
          <div style={{ flex: 1, fontWeight: 700, fontSize: 13.5 }}>{it.name}{it.me ? " (나)" : ""}</div>

function RankingView({ db, me }) {
  const [tab, setTab] = useState("sell");
  const users = Object.values(db.users).filter((u) => u.role !== "admin");
  const sellRanking = users.filter((u) => u.rankingVisible !== false).sort((a, b) => b.sellerStats.totalEarned - a.sellerStats.totalEarned).slice(0, 20);
  const buyRanking = users.filter((u) => u.rankingVisible !== false).sort((a, b) => (b.buyerStats?.totalSpent || 0) - (a.buyerStats?.totalSpent || 0)).slice(0, 20);
  const groupRanking = db.groups.map((g) => {
    const total = g.members.reduce((sum, uid_) => {
      const u = db.users[uid_];
      if (!u) return sum;
      return sum + (u.sellerStats?.totalEarned || 0) + (u.buyerStats?.totalSpent || 0);
    }, 0);
    return { ...g, total };
  }).sort((a, b) => b.total - a.total);
  const me_ = db.users[me];

  return (
    <div>
      <h2 style={{ fontSize: 19, fontWeight: 900, marginTop: 0 }}>🏆 랭킹</h2>
      <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
        <button className={`gg-tab ${tab === "sell" ? "active" : ""}`} onClick={() => setTab("sell")}>판매 랭킹</button>
        <button className={`gg-tab ${tab === "buy" ? "active" : ""}`} onClick={() => setTab("buy")}>구매 랭킹</button>
        <button className={`gg-tab ${tab === "group" ? "active" : ""}`} onClick={() => setTab("group")}>그룹 랭킹</button>
      </div>
      <div style={{ fontSize: 12.5, color: COLORS.muted, marginBottom: 16 }}>
        내 정보 공개 여부는 {me_.rankingVisible !== false ? <b style={{ color: COLORS.secondary }}>공개</b> : <b style={{ color: COLORS.accent }}>비공개</b>}로 설정되어 있어요 — 마이페이지 프로필에서 바꿀 수 있어요.
      </div>
      {tab === "sell" && (
        sellRanking.length === 0 ? <EmptyState text="랭킹 데이터가 없어요." /> :
        <RankingList items={sellRanking.map((u, i) => ({ id: u.id, rank: i + 1, name: u.nickname, value: u.sellerStats.totalEarned, me: u.id === me }))} unit="P 판매" />
      )}
      {tab === "buy" && (
        buyRanking.length === 0 ? <EmptyState text="랭킹 데이터가 없어요." /> :
        <RankingList items={buyRanking.map((u, i) => ({ id: u.id, rank: i + 1, name: u.nickname, value: u.buyerStats?.totalSpent || 0, me: u.id === me }))} unit="P 구매" />
      )}
      {tab === "group" && (
        groupRanking.length === 0 ? <EmptyState text="아직 그룹이 없어요." /> :
        <RankingList items={groupRanking.map((g, i) => ({ id: g.id, rank: i + 1, name: `${g.name} (${g.members.length}명)`, value: g.total, me: false }))} unit="P 총합" />
      )}
    </div>
  );
}

   메시지 (관리자 ↔ 사용자)
--------------------------------------------------------------- */
function MessagesView({ db, me, isAdmin, onSend, peer, setPeer }) {
  const [msg, setMsg] = useState("");
  if (!isAdmin) {
    const thread = db.messages.filter((m) => (m.fromId === me && m.toId === "admin") || (m.fromId === "admin" && m.toId === me)).sort((a, b) => new Date(a.date) - new Date(b.date));
    return (
      <div>
        <h2 style={{ fontSize: 19, fontWeight: 900, marginTop: 0 }}>💬 운영자에게 메시지</h2>
        <div className="gg-card">
          <div style={{ maxHeight: 400, overflowY: "auto", marginBottom: 12, display: "flex", flexDirection: "column", gap: 10 }}>
            {thread.length === 0 ? <EmptyState text="운영자에게 궁금한 점을 물어보세요." /> : thread.map((m) => (
              <div key={m.id} style={{ alignSelf: m.fromId === me ? "flex-end" : "flex-start", maxWidth: "75%" }}>
                <div style={{ fontSize: 11, color: COLORS.muted, marginBottom: 2, textAlign: m.fromId === me ? "right" : "left" }}>{m.fromId === me ? "나" : "운영자"} · {fmtDate(m.date)}</div>
                <div style={{ background: m.fromId === me ? COLORS.primary : COLORS.bg, color: m.fromId === me ? "#fff" : COLORS.text, padding: "8px 12px", borderRadius: 12, fontSize: 13.5 }}>{m.content}</div>
              </div>
            ))}
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <input className="gg-input" placeholder="메시지 입력" value={msg} onChange={(e) => setMsg(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter" && msg.trim()) { onSend("admin", msg); setMsg(""); } }} />
            <button className="gg-btn" onClick={() => { if (msg.trim()) { onSend("admin", msg); setMsg(""); } }}><Send size={14} /></button>
          </div>
        </div>
      </div>
    );
  }
  const peerIds = Array.from(new Set(db.messages.filter((m) => m.fromId === "admin" || m.toId === "admin").map((m) => (m.fromId === "admin" ? m.toId : m.fromId))));
  const activePeer = peer || peerIds[0];
  const thread = activePeer ? db.messages.filter((m) => (m.fromId === "admin" && m.toId === activePeer) || (m.fromId === activePeer && m.toId === "admin")).sort((a, b) => new Date(a.date) - new Date(b.date)) : [];
  return (
    <div>
      <h2 style={{ fontSize: 19, fontWeight: 900, marginTop: 0 }}>💬 메시지함</h2>
      <div style={{ display: "grid", gridTemplateColumns: "180px 1fr", gap: 12 }}>
        <div className="gg-card" style={{ padding: 0 }}>
          {peerIds.length === 0 ? <div style={{ padding: 16 }}><EmptyState text="받은 메시지가 없어요." /></div> : peerIds.map((pid) => (
            <div key={pid} onClick={() => setPeer(pid)} style={{ padding: "10px 14px", cursor: "pointer", fontWeight: 700, fontSize: 13, background: activePeer === pid ? COLORS.bg : "transparent" }}>
              {db.users[pid]?.nickname || "탈퇴회원"}
            </div>
          ))}
        </div>
        <div className="gg-card">
          {!activePeer ? <EmptyState text="왼쪽에서 대화 상대를 선택하세요." /> : (
            <>
              <div style={{ maxHeight: 340, overflowY: "auto", marginBottom: 12, display: "flex", flexDirection: "column", gap: 10 }}>
                {thread.map((m) => (
                  <div key={m.id} style={{ alignSelf: m.fromId === "admin" ? "flex-end" : "flex-start", maxWidth: "75%" }}>
                    <div style={{ fontSize: 11, color: COLORS.muted, marginBottom: 2, textAlign: m.fromId === "admin" ? "right" : "left" }}>{m.fromId === "admin" ? "나(운영자)" : (db.users[activePeer]?.nickname || "탈퇴회원")} · {fmtDate(m.date)}</div>
                    <div style={{ background: m.fromId === "admin" ? COLORS.primary : COLORS.bg, color: m.fromId === "admin" ? "#fff" : COLORS.text, padding: "8px 12px", borderRadius: 12, fontSize: 13.5 }}>{m.content}</div>
                  </div>
                ))}
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <input className="gg-input" placeholder="메시지 입력" value={msg} onChange={(e) => setMsg(e.target.value)}
                  onKeyDown={(e) => { if (e.key === "Enter" && msg.trim()) { onSend(activePeer, msg); setMsg(""); } }} />
                <button className="gg-btn" onClick={() => { if (msg.trim()) { onSend(activePeer, msg); setMsg(""); } }}><Send size={14} /></button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

            <div key={h.id} style={{ padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: i < history.length - 1 ? `1px solid ${COLORS.border}` : "none" }}>

                <div style={{ fontSize: 13.5, fontWeight: 700 }}>{h.desc}</div>
                <div style={{ fontSize: 11.5, color: COLORS.muted, marginTop: 2 }}>{fmtDate(h.date)}</div>
              </div>
              <div style={{ fontWeight: 800, fontSize: 14, color: h.amount >= 0 ? COLORS.secondary : COLORS.accent }}>
                {h.amount >= 0 ? "+" : ""}{h.amount.toLocaleString()}P
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AttendanceCalendar({ user, onAttend }) {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const first = new Date(year, month, 1).getDay();
  const days = new Date(year, month + 1, 0).getDate();
  const checkedToday = user.attendance.dates.includes(todayStr());
  const cells = [];
  for (let i = 0; i < first; i++) cells.push(null);
  for (let d = 1; d <= days; d++) cells.push(d);
  return (
    <div className="gg-card">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ fontWeight: 800 }}>{year}년 {month + 1}월 · 🔥 연속 {user.attendance.streak}일</div>
        <button className="gg-btn gg-btn-secondary" disabled={checkedToday} onClick={onAttend}>{checkedToday ? "출석완료" : "출석 +20P"}</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6, fontSize: 12, textAlign: "center", color: COLORS.muted, marginBottom: 6 }}>
        {["일", "월", "화", "수", "목", "금", "토"].map((d) => <div key={d}>{d}</div>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6 }}>
        {cells.map((d, i) => {
          const dateStr = d ? `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}` : null;
          const checked = dateStr && user.attendance.dates.includes(dateStr);
          return (
            <div key={i} style={{
              aspectRatio: "1", display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 8, fontSize: 12.5, fontWeight: 700,
              background: checked ? COLORS.secondary : "transparent", color: checked ? "#fff" : d ? COLORS.text : "transparent",
            }}>{d || ""}</div>
          );
        })}
      </div>
    </div>
  );
}

                </>
              ) : (
                <button className="gg-btn" onClick={() => { onAddNotice(noticeForm.title, noticeForm.content); setNoticeForm({ title: "", content: "" }); }}>공지 등록</button>
              )}
            </div>
          </div>
          {db.notices.map((n) => (
            <div key={n.id} className="gg-card" style={{ marginBottom: 10, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div><div style={{ fontWeight: 800, fontSize: 13.5 }}>{n.title}</div><div style={{ fontSize: 12.5, color: COLORS.muted, marginTop: 4 }}>{n.content}</div></div>
              <div style={{ display: "flex", gap: 4 }}>
                <button className="gg-icon-btn" onClick={() => { setNoticeForm({ title: n.title, content: n.content }); setEditingNoticeId(n.id); }}><Edit3 size={14} /></button>
                <button className="gg-icon-btn" onClick={() => onDeleteNotice(n.id)}><Trash2 size={14} /></button>
              </div>
            </div>
          ))}
        </div>
      )}

      {tab === "reports" && (
        <div className="gg-card" style={{ padding: 0 }}>
          {db.reports.length === 0 ? <div style={{ padding: 20 }}><EmptyState text="신고 내역이 없어요." /></div> : db.reports.slice().reverse().map((r, i) => {
            const target = r.type === "자료" ? db.materials.find((m) => m.id === r.targetId) : db.posts.find((p) => p.id === r.targetId);
            return (
            <div key={r.id} style={{ padding: "12px 16px", borderBottom: i < db.reports.length - 1 ? `1px solid ${COLORS.border}` : "none" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 13 }}>
                    [{r.type}] <span style={{ color: COLORS.primary }}>"{r.targetTitle}"</span> · 사유: {r.reason}
                  </div>
                  <div style={{ fontSize: 11.5, color: COLORS.muted, marginTop: 3 }}>신고자: {db.users[r.reporterId]?.nickname || "탈퇴회원"} · {fmtDate(r.date)}</div>
                </div>
                <Badge color={r.status === "대기" ? COLORS.accent : COLORS.secondary}>{r.status}</Badge>
              </div>
              <div style={{ display: "flex", gap: 6, alignItems: "center", marginTop: 8, flexWrap: "wrap" }}>
                {target ? (
                  <button className="gg-btn-outline" style={{ fontSize: 11 }} onClick={() => (r.type === "자료" ? onOpenMat(target) : onOpenPost(target))}>대상 확인하기</button>
                ) : (
                  <span style={{ fontSize: 11.5, color: COLORS.muted }}>(이미 삭제된 대상)</span>
                )}
                {r.status === "대기" && (
                  <>
                    <button className="gg-btn-outline" style={{ fontSize: 11, color: COLORS.accent }} onClick={() => {
                      const alsoDelete = target ? confirm("이 자료/글을 삭제 조치할까요?\n(확인=삭제 후 처리완료, 취소=삭제 없이 처리완료)") : false;
                      onResolveReport(r.id, "처리완료", alsoDelete);
                    }}>처리완료</button>
                    <button className="gg-btn-outline" style={{ fontSize: 11 }} onClick={() => onResolveReport(r.id, "반려", false)}>반려</button>
                  </>
                )}
              </div>
            </div>
          ); })}
        </div>
      )}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
